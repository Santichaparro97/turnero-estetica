      [["Servicio",st.service.n],["Profesional",st.pro?st.pro.n:"A definir"],["Día",st.day||"Hoy sáb 14"],["Hora",st.time||"10:00"],["Total",money(st.service.p)]].forEach(function(r){h+='<div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;"><span class="lab" style="font-size:9px;color:var(--dim);">'+r[0]+'</span><span style="font-weight:500;'+(r[0]==="Total"?'color:var(--rose);':'')+'">'+r[1]+'</span></div>';});
      h+='</div>';
      h+='<button id="cont" class="rbtn" style="width:100%;padding:16px;font-size:15px;display:flex;align-items:center;justify-content:center;gap:9px;"><i class="ti ti-brand-whatsapp" style="font-size:19px;"></i> Confirmar turno</button>';
      h+='</div>';screen.innerHTML=h;document.getElementById("cont").addEventListener("click",function(){st.step=6;render();});bindBack();
    }
    else if(s===6){
      h=bars(5)+'<div class="up" style="padding:16px;min-height:calc(100% - 33px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">';
      h+='<div style="width:104px;height:104px;border-radius:50%;background:linear-gradient(135deg,#E3B7BC,#B76E79);display:flex;align-items:center;justify-content:center;font-size:52px;color:#fff;box-shadow:0 16px 40px rgba(183,110,121,.4);"><i class="ti ti-check"></i></div>';
      h+='<div class="disp" style="font-size:42px;font-weight:700;margin-top:24px;">¡Turno reservado!</div>';
      h+='<div style="font-size:14px;color:var(--dim);margin-top:8px;line-height:1.6;">Nos vemos '+(st.day||"pronto")+', <span style="color:var(--rose);font-weight:500;">'+NAME+'</span>.<br>Te va a quedar <span style="font-style:italic;">hermoso</span>.</div>';
      h+='<button class="restart lab" style="margin-top:34px;color:var(--rose);font-size:10px;">Volver al inicio</button>';
      h+='</div>';screen.innerHTML=h;
      screen.querySelector(".restart").addEventListener("click",function(){st={view:"home",step:0,cat:null,service:null,pro:null,proPreset:false,day:null,time:null,daysShown:3,openDays:[0,1]};render();});
    }
  }

  function STEP4(){
    var h=topflow("Paso 4 · Día y hora")+'<div class="up" style="padding:6px 16px;">'+'<div class="disp" style="font-size:32px;font-weight:600;">¿Cuándo te <span style="font-style:italic;color:var(--rose);">viene</span>?</div><div style="height:2px;width:44px;background:var(--rose);border-radius:2px;margin:10px 0 16px;"></div>';
    for(var i=0;i<st.daysShown;i++){
      var d=WEEK[i],open=st.openDays.indexOf(i)>=0;
      h+='<div class="card" style="margin-bottom:11px;overflow:hidden;border-color:'+(open?'var(--rose)':'var(--line)')+';">';
      h+='<button class="dayhd" data-i="'+i+'" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;text-align:left;">'
        +'<div style="display:flex;align-items:baseline;gap:9px;"><span class="disp" style="font-size:22px;font-weight:600;color:'+(open?'var(--rose)':'var(--txt)')+';">'+d[0].charAt(0)+d[0].slice(1).toLowerCase()+'</span><span class="lab" style="font-size:9px;color:var(--dim);">'+d[1]+'</span></div>'
        +(open?'<i class="ti ti-chevron-up" style="color:var(--rose);font-size:20px;"></i>':'<span class="lab" style="font-size:9px;color:var(--rose);display:flex;align-items:center;gap:4px;">Ver horarios <i class="ti ti-chevron-down" style="font-size:15px;"></i></span>')+'</button>';
      h+='<div class="acc" style="max-height:'+(open?'320px':'0')+';"><div style="padding:2px 14px 16px;"><div class="lab" style="font-size:9px;color:var(--rose);margin:0 2px 10px;">Horarios disponibles</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">';
      var taken=i===0?["11:30","15:00"]:(i===1?["10:00"]:[]);
      TIMES.forEach(function(t){var off=taken.indexOf(t)>=0;h+='<button class="slot" '+(off?'disabled':'data-t="'+t+'" data-day="'+i+'"')+' style="padding:11px 0;border-radius:11px;font-size:13px;font-weight:500;'+(off?'background:transparent;color:#cdbcbc;text-decoration:line-through;border:1px solid var(--line);':'background:var(--s2);border:1px solid var(--line);color:var(--txt);')+'">'+t+'</button>';});
      h+='</div></div></div></div>';
    }
    if(st.daysShown<7){h+='<button id="more" class="lab" style="width:100%;padding:14px;border-radius:14px;border:1px dashed var(--rose);color:var(--rose);font-size:11px;background:transparent;margin-top:2px;"><i class="ti ti-calendar-plus"></i> Ver 3 días más</button>';}
    else{h+='<div class="lab" style="text-align:center;font-size:10px;color:var(--dim);padding:12px;">Hasta 1 semana de anticipación</div>';}
    h+='</div>';screen.innerHTML=h;
    Array.prototype.forEach.call(screen.querySelectorAll(".dayhd"),function(el){el.addEventListener("click",function(){var i=+el.getAttribute("data-i"),k=st.openDays.indexOf(i);if(k>=0)st.openDays.splice(k,1);else st.openDays.push(i);render();});});
    Array.prototype.forEach.call(screen.querySelectorAll(".slot[data-t]"),function(el){el.addEventListener("click",function(){el.classList.add("pop");el.style.background="linear-gradient(100deg,#CE8B97,#E3B7BC)";el.style.color="#fff";var d=WEEK[+el.getAttribute("data-day")];st.day=d[0].charAt(0)+d[0].slice(1).toLowerCase()+" "+d[1];st.time=el.getAttribute("data-t");setTimeout(function(){st.step=5;render();},170);});});
    var m=document.getElementById("more");if(m)m.addEventListener("click",function(){st.daysShown=Math.min(7,st.daysShown+3);render();});bindBack();
  }

  function attachCar(carId,dotsId){var car=document.getElementById(carId),dots=document.getElementById(dotsId);if(!car||!dots)return;var n=dots.children.length,last=-1,tick=0;
    car.addEventListener("scroll",function(){var now=Date.now();if(now-tick<90)return;tick=now;var ch=car.children;if(ch.length<2)return;var stride=ch[1].offsetLeft-ch[0].offsetLeft;if(stride<=0)return;
      var center=car.scrollLeft+car.clientWidth/2,idx=Math.round((center-(ch[0].offsetLeft+ch[0].offsetWidth/2))/stride);idx=((idx%n)+n)%n;
      if(idx===last)return;last=idx;for(var j=0;j<n;j++)dots.children[j].className="dot"+(j===idx?" on":"");},{passive:true});}
  function autoScroll(carId,dir){var car=document.getElementById(carId);if(!car||car.children.length<2)return;dir=dir||1;var paused=false,t,pos=0,SPEED=0.5,init=false;
    function pause(){paused=true;clearTimeout(t);t=setTimeout(function(){paused=false;pos=car.scrollLeft;},500);}
    car.addEventListener("pointerdown",pause);car.addEventListener("wheel",pause,{passive:true});car.addEventListener("touchstart",pause,{passive:true});car.addEventListener("touchmove",pause,{passive:true});
    function step(){if(!document.body.contains(car))return;if(paused){pos=car.scrollLeft;}else{var nn=car.children.length/2,one=car.children[nn].offsetLeft-car.children[0].offsetLeft;if(one>0){if(!init){if(dir<0)pos=one;init=true;}pos+=SPEED*dir;if(pos>=one)pos-=one;if(pos<0)pos+=one;car.scrollLeft=pos;}}requestAnimationFrame(step);}requestAnimationFrame(step);}

  function overlay(inner){var ov=document.createElement("div");ov.className="ovl";ov.style.cssText="position:absolute;inset:0;z-index:40;background:rgba(74,58,58,0.4);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;animation:fade .2s ease;";
    ov.innerHTML='<div style="position:relative;width:86%;height:70%;background:var(--bg);border:1px solid var(--rosel);border-radius:24px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 70px rgba(120,70,80,.45);animation:zoom .26s cubic-bezier(.22,1,.36,1);"><button class="close" aria-label="Cerrar" style="position:absolute;top:12px;right:12px;z-index:3;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.85);color:var(--rose);font-size:19px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.12);"><i class="ti ti-x"></i></button>'+inner+'</div>';
    document.getElementById("phone").appendChild(ov);ov.addEventListener("click",function(e){if(e.target===ov)ov.remove();});ov.querySelector(".close").onclick=function(){ov.remove();};return ov;}

  function openPro(i){var p=pros[i];
    var inner='<div style="height:52%;position:relative;">'+ph("user","100%")
      +'<div style="position:absolute;left:0;right:0;bottom:0;padding:18px;background:linear-gradient(transparent,rgba(74,40,45,.55));"><div class="lab" style="font-size:9px;color:#fff;">Especialista</div><div class="disp" style="font-size:40px;font-weight:700;color:#fff;">'+p.n+'</div><div class="lab" style="font-size:10px;color:#ffe;"><i class="ti ti-star"></i> '+p.r+' · '+p.c+' servicios</div></div></div>'
      +'<div style="flex:1;padding:16px 18px;display:flex;flex-direction:column;min-height:0;"><div class="lab" style="font-size:9px;color:var(--rose);margin-bottom:8px;">'+p.h+'</div><p style="font-size:13px;color:#7a6464;line-height:1.65;margin:0;overflow:auto;">'+p.x+'</p>'
      +'<div style="margin-top:auto;padding-top:14px;"><button class="conf rbtn" style="width:100%;padding:15px;font-size:15px;">Reservar con '+p.n+' <i class="ti ti-arrow-right"></i></button></div></div>';
    var ov=overlay(inner);ov.querySelector(".conf").onclick=function(){st.pro=p;ov.remove();if(st.view==="flow"&&st.step===3){st.step=4;render();}else{st.proPreset=true;go("flow",1);}};}

  function openWork(i){var w=works[i];
    var inner='<div style="height:60%;position:relative;">'+ph("sparkles","100%")
      +'<div style="position:absolute;left:0;right:0;bottom:0;padding:18px;background:linear-gradient(transparent,rgba(74,40,45,.55));"><div class="disp" style="font-size:34px;font-weight:700;color:#fff;">'+w.t+'</div><div class="lab" style="font-size:10px;color:#ffe;"><i class="ti ti-heart"></i> '+w.l+' me gusta</div></div></div>'
      +'<div style="flex:1;padding:16px 18px;display:flex;flex-direction:column;min-height:0;"><p style="font-size:13px;color:#7a6464;line-height:1.65;margin:0;">Trabajo realizado por nuestras especialistas. Pedí tu turno y llevate un resultado así.</p>'
      +'<div style="margin-top:auto;padding-top:14px;"><button class="conf rbtn" style="width:100%;padding:15px;font-size:15px;">Pedir un turno <i class="ti ti-arrow-right"></i></button></div></div>';
    var ov=overlay(inner);ov.querySelector(".conf").onclick=function(){ov.remove();go("flow",1);};}

  function backStep(){var ovl=document.querySelector("#phone .ovl");if(ovl){ovl.remove();return;}if(st.view!=="flow")return;if(st.step<=1){go("home",0);}else if(st.step===4&&st.proPreset){st.step=2;render();}else{st.step--;render();}}
  function bindBack(){var b=screen.querySelector(".bk");if(b)b.addEventListener("click",backStep);}
  function render(){st.view==="home"?HOME():FLOW();}
  (function(){var p=document.getElementById("phone"),sx=0,sy=0,inCar=false;
    p.addEventListener("touchstart",function(e){var t=e.touches[0];sx=t.clientX;sy=t.clientY;inCar=!!(e.target.closest&&e.target.closest(".car"));},{passive:true});
    p.addEventListener("touchend",function(e){var t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy;if(dx>55&&Math.abs(dx)>Math.abs(dy)*1.3&&(sx<34||!inCar))backStep();},{passive:true});})();
  render();
})();
</script>
</body>
</html>
